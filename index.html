<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小鐵人 5/24 台3線車訓</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;900&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 50%, #55efc4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #222;
}
.container {
    width: 100%;
    max-width: 960px;
    text-align: center;
}
.title {
    color: #fff;
    font-size: 36px;
    font-weight: 900;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(0,0,0,.18);
}
.subtitle {
    color: rgba(255,255,255,.94);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 40px;
    text-shadow: 0 1px 6px rgba(0,0,0,.15);
}
.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
}
.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,.98);
    border-radius: 20px;
    padding: 44px 28px 36px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 12px 36px rgba(0,0,0,.18);
    transition: transform .25s ease, box-shadow .25s ease;
    position: relative;
    overflow: hidden;
}
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
}
.card-organizer::before { background: linear-gradient(90deg, #2980b9, #74b9ff); }
.card-participant::before { background: linear-gradient(90deg, #27ae60, #55efc4); }
.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 48px rgba(0,0,0,.24);
}
.card-icon {
    font-size: 72px;
    line-height: 1;
    margin-bottom: 18px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
}
.card-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a2a3a;
    margin-bottom: 8px;
}
.card-organizer .card-title { color: #1a5276; }
.card-participant .card-title { color: #186a3b; }
.card-desc {
    font-size: 14.5px;
    color: #5d6c7e;
    line-height: 1.65;
    margin-bottom: 22px;
    min-height: 48px;
}
.card-cta {
    display: inline-block;
    padding: 10px 26px;
    border-radius: 999px;
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
}
.card-organizer .card-cta { background: #2980b9; }
.card-participant .card-cta { background: #27ae60; }
.event-meta {
    margin-top: 36px;
    color: rgba(255,255,255,.92);
    font-size: 14px;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,.12);
}
.event-meta span { display: inline-block; margin: 0 12px; }
@media (max-width: 700px) {
    .title { font-size: 28px; }
    .subtitle { font-size: 15px; margin-bottom: 28px; }
    .cards { grid-template-columns: 1fr; gap: 20px; }
    .card { padding: 32px 22px 28px; }
    .card-icon { font-size: 58px; }
    .card-title { font-size: 19px; }
    .event-meta span { display: block; margin: 4px 0; }
}
</style>
</head>
<body>
<div class="container">
    <h1 class="title">小鐵人 — 台3線車訓</h1>
    <p class="subtitle">5/24（日）｜龍潭大池 ↔ 7-11 騰達門市｜全程 41 km</p>

    <div class="cards">
        <a href="organizer.html" class="card card-organizer">
            <div class="card-icon">📋</div>
            <div class="card-title">主辦單位<br>行前注意事項</div>
            <div class="card-desc">分組／工作分配、交管、補給、便當訂單、Check List</div>
            <span class="card-cta">進入 ›</span>
        </a>
        <a href="participant.html" class="card card-participant">
            <div class="card-icon">🚴</div>
            <div class="card-title">參加人員<br>行前手冊</div>
            <div class="card-desc">時程、路線、安全須知、自備物品、團騎規則</div>
            <span class="card-cta">進入 ›</span>
        </a>
    </div>

    <p class="event-meta">
        <span>📅 5/24（日）07:00 集合</span>
        <span>📍 龍潭大池．貴族世家右側停車場</span>
    </p>
</div>
</body>
</html>
